<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>__SLUG__-grid-slide-__SLIDE_N__-__LAYOUT_NAME__</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  /* ─── Frame: 1080×1350 (IG Grid carousel, 4:5 portrait) ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Bg layers (mirrors story template) ─── */
  .bg { position: absolute; inset: 0; background-repeat: no-repeat; background-size: cover; background-position: center; }
  .bg--top-half { position: absolute; top: 0; left: 0; right: 0; height: 50%; background-repeat: no-repeat; background-size: cover; background-position: center; }
  .bg--left-60 { position: absolute; top: 0; left: 0; width: 60%; height: 100%; background-repeat: no-repeat; background-size: cover; background-position: center; }
  .bg--solid-bottom-50 { position: absolute; bottom: 0; left: 0; right: 0; height: 50%; background: #000; }
  .bg--solid-bottom-40 { position: absolute; bottom: 0; left: 0; right: 0; height: 40%; background: #000; }
  .ghost { position: absolute; inset: 0; background-repeat: no-repeat; background-size: cover; background-position: center; opacity: 0.10; }

  /* ─── Gradients ─── */
  .gradient { position: absolute; pointer-events: none; }
  .gradient--top-left { inset: 0; background: linear-gradient(135deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0) 60%); }
  .gradient--bottom-35 { left: 0; right: 0; bottom: 0; height: 35%; background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 100%); }

  /* ─── Typography defaults ─── */
  .wordmark { font-family: 'Inter', sans-serif; font-weight: 900; letter-spacing: 0.18em; color: #fff; text-transform: uppercase; }
  .eyebrow { font-family: 'Inter', sans-serif; letter-spacing: 0.30em; text-transform: uppercase; color: #6b6b6b; font-weight: 700; }
  .headline { font-family: 'Bebas Neue', 'Anton', 'Arial Narrow', Impact, sans-serif; color: #fff; line-height: 0.95; letter-spacing: 0.02em; }
  .body { font-family: 'Inter', sans-serif; color: #c8c8c8; }
  .price { font-family: 'Bebas Neue', 'Anton', sans-serif; color: #c8c8c8; }
  .url { font-family: 'Inter', sans-serif; color: #c8c8c8; }

  /* ─── Sticker hints (reviewer aids; hidden in POSTABLE) ─── */
  .sticker-hint {
    position: absolute;
    border: 2px dashed #ff7a59;
    color: #ff7a59;
    padding: 8px 12px;
    font-family: 'JetBrains Mono', 'SF Mono', monospace;
    font-size: 18px;
    line-height: 1.25;
    border-radius: 4px;
    background: rgba(0,0,0,0.6);
    max-width: 360px;
    z-index: 10;
  }
  body[data-mode="postable"] .sticker-hint { display: none; }
  .sticker-hint--top-left     { top: 80px; left: 50px; }
  .sticker-hint--top-right    { top: 80px; right: 50px; }
  .sticker-hint--center-right { top: 50%; right: 50px; transform: translateY(-50%); }
  .sticker-hint--center-left  { top: 50%; left: 50px; transform: translateY(-50%); }
  .sticker-hint--bottom-left  { bottom: 100px; left: 50px; }
  .sticker-hint--bottom-right { bottom: 100px; right: 50px; }

  /* ─── Layout: HERO ─── */
  .layout-hero .content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center;
    padding: 200px 80px 240px;
  }
  .layout-hero .wordmark { align-self: flex-start; font-size: 26px; }
  .layout-hero .headline { font-size: 140px; margin-top: 140px; text-align: center; }
  .layout-hero .body { font-size: 26px; text-align: center; margin-top: 24px; max-width: 760px; line-height: 1.4; }

  /* ─── Layout: DETAIL ─── */
  .layout-detail .content {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 0 80px 220px; text-align: center;
  }
  .layout-detail .headline { font-size: 70px; margin-bottom: 20px; line-height: 1; }
  .layout-detail .body { font-size: 26px; line-height: 1.45; max-width: 820px; margin: 0 auto; color: #c8c8c8; }

  /* ─── Layout: SCARCITY ─── */
  .layout-scarcity .content {
    position: absolute; left: 0; right: 0; bottom: 0; height: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 0 80px 220px; text-align: center;
  }
  .layout-scarcity .eyebrow { font-size: 22px; margin-bottom: 20px; }
  .layout-scarcity .headline { font-size: 155px; line-height: 0.9; }
  .layout-scarcity .price { font-size: 70px; margin-top: 18px; }

  /* ─── Layout: MANIFESTO ─── */
  .layout-manifesto .content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 200px 80px 220px; text-align: center;
  }
  .layout-manifesto .headline { font-size: 155px; letter-spacing: 0.06em; }
  .layout-manifesto .body { font-size: 30px; color: #6b6b6b; margin-top: 44px; }

  /* ─── Layout: CTA ─── */
  .layout-cta .content {
    position: absolute; left: 0; right: 0; bottom: 0; height: 40%;
    background: #000;
    padding: 56px 80px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .layout-cta .eyebrow { font-size: 22px; margin-bottom: 24px; }
  .layout-cta .headline { font-size: 90px; line-height: 1; align-self: center; }
  .layout-cta .url { font-size: 26px; margin-top: 26px; text-align: right; color: #c8c8c8; }

  /* ─── Review-only footer caption ─── */
  .review-caption {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: rgba(17,17,17,0.92);
    color: #c8c8c8;
    padding: 12px 50px;
    font-family: 'JetBrains Mono', 'SF Mono', monospace;
    font-size: 16px;
    text-align: center;
    border-top: 1px solid #2a2a2a;
    z-index: 5;
  }
  body[data-mode="postable"] .review-caption { display: none; }
</style>
</head>
<body data-mode="review">

<!-- Hydrated by scripts/render-story.ts -->
<div id="root"></div>

<script type="application/json" id="drop-spec">__DROP_SPEC__</script>
<script type="application/json" id="slide-spec">__SLIDE_SPEC__</script>

<script>
/* eslint-disable */
(function() {
  var drop = JSON.parse(document.getElementById('drop-spec').textContent);
  var slide = JSON.parse(document.getElementById('slide-spec').textContent);
  var root = document.getElementById('root');
  root.className = 'layout-' + slide.layout;

  // Background layer(s) per layout — mirrors story-slide.html
  if (slide.layout === 'hero') {
    var bg1 = document.createElement('div');
    bg1.className = 'bg';
    bg1.style.backgroundImage = 'url("' + drop.images.front + '")';
    root.appendChild(bg1);
    var g1 = document.createElement('div');
    g1.className = 'gradient gradient--top-left';
    root.appendChild(g1);
    var c1 = document.createElement('div');
    c1.className = 'content';
    var wm1 = document.createElement('div');
    wm1.className = 'wordmark';
    wm1.textContent = slide.wordmark || '';
    c1.appendChild(wm1);
    var h1 = document.createElement('div');
    h1.className = 'headline';
    h1.textContent = slide.headline || '';
    c1.appendChild(h1);
    (slide.body || []).forEach(function(line) {
      var p = document.createElement('div');
      p.className = 'body';
      p.textContent = line;
      c1.appendChild(p);
    });
    root.appendChild(c1);
  }

  else if (slide.layout === 'detail') {
    var bg2 = document.createElement('div');
    bg2.className = 'bg';
    bg2.style.backgroundImage = 'url("' + drop.images.back + '")';
    root.appendChild(bg2);
    var g2 = document.createElement('div');
    g2.className = 'gradient gradient--bottom-35';
    root.appendChild(g2);
    var c2 = document.createElement('div');
    c2.className = 'content';
    var h2 = document.createElement('div');
    h2.className = 'headline';
    h2.textContent = slide.headline || '';
    c2.appendChild(h2);
    (slide.body || []).forEach(function(line) {
      var p = document.createElement('div');
      p.className = 'body';
      p.textContent = line;
      c2.appendChild(p);
    });
    root.appendChild(c2);
  }

  else if (slide.layout === 'scarcity') {
    var bgTop = document.createElement('div');
    bgTop.className = 'bg--top-half';
    bgTop.style.backgroundImage = 'url("' + drop.images.front + '")';
    root.appendChild(bgTop);
    var bgBot = document.createElement('div');
    bgBot.className = 'bg--solid-bottom-50';
    root.appendChild(bgBot);
    var c3 = document.createElement('div');
    c3.className = 'content';
    var eb3 = document.createElement('div');
    eb3.className = 'eyebrow';
    eb3.textContent = slide.eyebrow || '';
    c3.appendChild(eb3);
    var h3 = document.createElement('div');
    h3.className = 'headline';
    h3.textContent = slide.headline || '';
    c3.appendChild(h3);
    var pr3 = document.createElement('div');
    pr3.className = 'price';
    pr3.textContent = slide.price || '';
    c3.appendChild(pr3);
    root.appendChild(c3);
  }

  else if (slide.layout === 'manifesto') {
    var bgG = document.createElement('div');
    bgG.className = 'ghost';
    bgG.style.backgroundImage = 'url("' + drop.images.front + '")';
    root.appendChild(bgG);
    var c4 = document.createElement('div');
    c4.className = 'content';
    var h4 = document.createElement('div');
    h4.className = 'headline';
    h4.textContent = slide.headline || '';
    c4.appendChild(h4);
    (slide.body || []).forEach(function(line) {
      var p = document.createElement('div');
      p.className = 'body';
      p.textContent = line;
      c4.appendChild(p);
    });
    root.appendChild(c4);
  }

  else if (slide.layout === 'cta') {
    var bgL = document.createElement('div');
    bgL.className = 'bg--left-60';
    bgL.style.backgroundImage = 'url("' + drop.images.front + '")';
    root.appendChild(bgL);
    var bgR = document.createElement('div');
    bgR.className = 'bg--solid-bottom-40';
    root.appendChild(bgR);
    var c5 = document.createElement('div');
    c5.className = 'content';
    var eb5 = document.createElement('div');
    eb5.className = 'eyebrow';
    eb5.textContent = slide.eyebrow || '';
    c5.appendChild(eb5);
    var h5 = document.createElement('div');
    h5.className = 'headline';
    h5.textContent = (slide.headline || '') + ' \u2192';
    c5.appendChild(h5);
    var u5 = document.createElement('div');
    u5.className = 'url';
    u5.textContent = slide.url || '';
    c5.appendChild(u5);
    root.appendChild(c5);
  }

  // IG carousel uses NATIVE IG stickers ✓ (carousel has fewer sticker slots than Stories).

  // Review-only caption strip
  var cap = document.createElement('div');
  cap.className = 'review-caption';
  cap.textContent = 'REVIEW MODE \u2014 IG Grid carousel slide. Stripped during PNG capture. (1080\u00d71350)';
  document.body.appendChild(cap);
})();
</script>

</body>
</html>
